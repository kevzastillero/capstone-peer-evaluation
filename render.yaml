services:
  - type: web
    name: bpm-peer-evaluation
    runtime: docker
    plan: free
    envVars:
      - key: APP_NAME
        value: "Peer Evaluation"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: bpm-peer-evaluation-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file

databases:
  - name: bpm-peer-evaluation-db
    plan: free
